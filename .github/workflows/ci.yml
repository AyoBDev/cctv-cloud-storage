name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

jobs:
  ci:
    name: Lint → Test → Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cctv
          POSTGRES_PASSWORD: cctv_test
          POSTGRES_DB: cctv_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgres://cctv:cctv_test@localhost:5432/cctv_test
      DATABASE_SSL: false
      REDIS_URL: redis://localhost:6379
      JWT_PRIVATE_KEY: ${{ secrets.CI_JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.CI_JWT_PUBLIC_KEY }}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3001
      RATE_LIMIT_MAX: 1000
      RATE_LIMIT_WINDOW: 60000
      LOG_LEVEL: error
      INTERNAL_API_SECRET: ci-test-secret-minimum-16-chars
      AWS_REGION: us-east-1
      SEED_ADMIN_EMAIL: admin@cctv-cloud.local
      SEED_ADMIN_PASSWORD: changeme123!

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run migrations
        run: npm run migrate

      - name: Seed database
        run: npm run seed

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
